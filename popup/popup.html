<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>Credentials changer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="popup.js" defer></script>
  </head>

  <body>
    <div class="tabs">
      <button class="tab-btn active" data-tab="capture">Capture</button>
      <button class="tab-btn" data-tab="apply">Apply</button>
    </div>

    <div id="tab-capture" class="tab-content active card">
      <p class="card-description">Save cookies from the current tab</p>
      <form id="form">
        <label class="form-label" for="name">
          Platform
          <input
            type="text"
            class="form-input"
            id="name"
            placeholder="Ex: Production, Staging..."
          />
        </label>

        <div id="fieldsContainer"></div>

        <div class="form-actions">
          <button type="button" class="button button-cancel" id="cancelBtn">Clear</button>
          <button type="submit" class="button button-primary" id="saveBtn">Save</button>
        </div>
      </form>
    </div>

    <div id="tab-apply" class="tab-content card">
      <p class="card-description">Paste cookies into the current tab</p>
      <div id="credentialsList"></div>
      <p id="emptyState" class="empty-state">No credentials saved yet.</p>
    </div>
  </body>
</html>
